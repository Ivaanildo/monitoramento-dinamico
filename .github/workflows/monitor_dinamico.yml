# ATENCAO: cada run usa o commit que estava no topo de main NO MOMENTO do disparo.
# Apos um push, acione Run workflow manualmente so depois de confirmar o SHA no GitHub.
name: Monitor Dinamico (Pooling)

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  coletar_dados:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependencias
        run: pip install -r backend/requirements.txt

      - name: Executar coletor offline
        working-directory: backend
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          HERE_API_KEY: ${{ secrets.HERE_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python workers/coletor.py

      - name: Upload relatorio Excel
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-painel-${{ github.run_number }}
          path: backend/relatorios/
          retention-days: 7
          if-no-files-found: warn
